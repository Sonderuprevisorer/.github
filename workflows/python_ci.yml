name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
 
      - name: Install dependencies
        run: uv sync
 
      - name: Lint with ruff
        run: uv run ruff check .
 
      - name: Run tests
        run: uv run pytest
